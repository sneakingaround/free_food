# Copy to sneakingaround/whisper on branch main to publish this site from
# branch investment-theses-pages via GitHub Pages Actions.
name: Publish investment theses

on:
  push:
    branches: [investment-theses-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: investment-theses-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: investment-theses-pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
      - run: echo "URL=${{ steps.deployment.outputs.page_url }}"
