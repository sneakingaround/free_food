name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh market data
        run: python3 fetch-market.py || true

      - name: Publish to docs/ (served from main branch)
        run: |
          rm -rf docs
          mkdir -p docs
          cp index.html styles.css app.js data.js vpvr.js chart.umd.min.js .nojekyll docs/
          cp -r market docs/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && exit 0
          git commit -m "Update site in docs/ [skip ci]"
          git push
