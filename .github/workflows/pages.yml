name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable GitHub Pages (gh-pages branch)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: "gh-pages", path: "/" };
            try {
              await github.rest.repos.getPages({ owner, repo });
              await github.rest.repos.updateInformationAboutPagesSite({
                owner,
                repo,
                build_type: "legacy",
                source,
              });
              core.info("Updated Pages source to gh-pages");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: "legacy",
                  source,
                });
                core.info("Created Pages site from gh-pages");
              } else {
                throw e;
              }
            }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh market data
        run: python3 fetch-market.py || true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js data.js vpvr.js chart.umd.min.js .nojekyll _site/
          cp -r market _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
